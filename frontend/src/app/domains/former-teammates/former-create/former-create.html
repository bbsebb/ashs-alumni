<h2>Ajout d'un nouveau contact</h2>
<form [formGroup]="formerForm" (ngSubmit)="onSubmit()">
  <h3>Informations</h3>
  <mat-button-toggle-group name="gender" formControlName="gender" aria-label="Gender">
    <mat-button-toggle value="M">Masculin</mat-button-toggle>
    <mat-button-toggle value="F">Féminin</mat-button-toggle>
  </mat-button-toggle-group>
  <mat-form-field>
    <mat-label>Prénom</mat-label>
    <input matInput formControlName="firstName" required>
    <mat-error>Le prénom est requis</mat-error>
  </mat-form-field>
  <mat-form-field>
    <mat-label>Nom</mat-label>
    <input matInput formControlName="lastName" required>
    <mat-error>Le nom est requis</mat-error>
  </mat-form-field>
  <mat-form-field>
    <mat-label>Téléphone</mat-label>
    <input matInput formControlName="phone" type="tel">
  </mat-form-field>
  <mat-form-field>
    <mat-label>Date de naissance</mat-label>
    <input matInput formControlName="birthDate" [matDatepicker]="picker">
    <mat-hint>DD/MM/YYYY</mat-hint>
    <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker startView="multi-year" [startAt]="startAt" #picker></mat-datepicker>
  </mat-form-field>
  <h3>Fonction à Hoenheim</h3>
  <mat-button-toggle-group name="roles" formControlName="roles" aria-label="Roles" [multiple]="true">
    @for(role of roles; track role) {
      <mat-button-toggle [value]="role">{{role | role}}</mat-button-toggle>
    }
  </mat-button-toggle-group>
  <div id="action">
    <app-back-button link='/former-teammates/former-list'/>
    <button mat-button type="submit">Enregistrer</button>
  </div>
</form>
